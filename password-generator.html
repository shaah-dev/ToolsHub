<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator - ToolsHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-zinc-50 min-h-screen dark:bg-zinc-950">

    <div class="max-w-lg mx-auto px-4 py-8">
        <a href="index.html" class="inline-flex items-center gap-2 text-zinc-500 hover:text-zinc-700 mb-8">
            <i class="fa-solid fa-arrow-left"></i> Back to Home
        </a>

        <div class="bg-white dark:bg-zinc-900 rounded-3xl shadow-xl p-8 md:p-10">
            <div class="text-center mb-10">
                <div class="w-20 h-20 mx-auto bg-emerald-100 dark:bg-emerald-900 text-emerald-600 rounded-2xl flex items-center justify-center text-4xl mb-4">🔐</div>
                <h1 class="text-3xl font-semibold text-zinc-900 dark:text-white">Password Generator</h1>
            </div>

            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-zinc-700 dark:text-zinc-300 mb-2">Password Length (4-32)</label>
                    <input type="number" id="length" value="16" min="4" max="32"
                           class="w-full px-5 py-4 border border-zinc-300 dark:border-zinc-700 rounded-2xl focus:outline-none focus:border-emerald-500 text-2xl font-mono dark:bg-zinc-800">
                </div>

                <button onclick="generate()" 
                        class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-4 rounded-2xl transition-all">
                    Generate Strong Password
                </button>

                <div id="output" 
                     class="font-mono text-xl bg-zinc-100 dark:bg-zinc-800 p-6 rounded-2xl break-all min-h-[70px] flex items-center border border-zinc-200 dark:border-zinc-700">
                </div>

                <div class="flex gap-3">
                    <button onclick="copyPassword()" 
                            class="flex-1 bg-zinc-800 hover:bg-black text-white py-4 rounded-2xl transition-all">
                        📋 Copy Password
                    </button>
                </div>

                <div id="strengthBar" class="h-3 rounded-full bg-zinc-200 dark:bg-zinc-700 overflow-hidden">
                    <div id="strengthFill" class="h-full w-0 transition-all"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function generate() {
            let length = Math.min(parseInt(document.getElementById("length").value) || 12, 32);
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+{}[]";
            let password = "";
            
            for (let i = 0; i < length; i++) {
                password += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            
            document.getElementById("output").innerText = password;
            checkStrength(password);
        }

        function copyPassword() {
            const text = document.getElementById("output").innerText;
            if (text) {
                navigator.clipboard.writeText(text).then(() => {
                    alert("✅ Password copied to clipboard!");
                });
            }
        }

        function checkStrength(pw) {
            let strength = 0;
            if (pw.length >= 8) strength++;
            if (/[A-Z]/.test(pw)) strength++;
            if (/[0-9]/.test(pw)) strength++;
            if (/[^A-Za-z0-9]/.test(pw)) strength++;

            const fill = document.getElementById("strengthFill");
            const percent = strength * 25;
            
            fill.style.width = percent + "%";
            
            if (strength <= 1) fill.style.background = "#ef4444";
            else if (strength === 2) fill.style.background = "#f59e0b";
            else if (strength === 3) fill.style.background = "#eab308";
            else fill.style.background = "#10b981";
        }

        // Generate one on load
        window.onload = generate;
    </script>
</body>
</html>
