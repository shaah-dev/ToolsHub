<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stylish Text - ToolsHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-zinc-50 min-h-screen dark:bg-zinc-950">

    <div class="max-w-lg mx-auto px-4 py-8">
        <a href="index.html" class="inline-flex items-center gap-2 text-zinc-500 hover:text-zinc-700 mb-8">
            <i class="fa-solid fa-arrow-left"></i> Back to Home
        </a>

        <div class="bg-white dark:bg-zinc-900 rounded-3xl shadow-xl p-8 md:p-10">
            <div class="text-center mb-10">
                <div class="w-20 h-20 mx-auto bg-pink-100 dark:bg-pink-900 text-pink-600 rounded-2xl flex items-center justify-center text-4xl mb-4">ã´</div>
                <h1 class="text-3xl font-semibold text-zinc-900 dark:text-white">Stylish Text Generator</h1>
            </div>

            <input type="text" id="input" placeholder="Type something cool..." 
                   oninput="convert()" 
                   class="w-full px-6 py-5 border border-zinc-300 dark:border-zinc-700 rounded-2xl text-lg focus:outline-none focus:border-pink-500 dark:bg-zinc-800">

            <div id="results" class="mt-8 space-y-4"></div>
        </div>
    </div>

    <script>
        function convert() {
            const text = document.getElementById("input").value.trim();
            const results = document.getElementById("results");
            results.innerHTML = "";

            if (!text) return;

            const styles = [
                {name: "Uppercase", fn: t => t.toUpperCase()},
                {name: "Lowercase", fn: t => t.toLowerCase()},
                {name: "Spaced", fn: t => t.split("").join(" ")},
                {name: "Fancy", fn: t => t.split("").map(c => 
                    "ÞˆÞ¨Þ˜ÞÙÞÛÞ₤Þ¯ÞÝÞýÞ°ÞÇÞçÞÑÞñÞ¡Þ¿Þ¤Þ£Þ¥Þ§ÞƒÞ¢ÞÞÞÞ"["abcdefghijklmnopqrstuvwxyz".indexOf(c.toLowerCase())] || c
                ).join("")},
                {name: "Bold", fn: t => t.split("").map(c => 
                    "ÞÞÞÞÞÞÞ ÞÀÞÂÞÈÞÊÞËÞÎÞÏÞ´ÞˋÞˆÞ¨Þ˜ÞÙÞÛÞ₤Þ¯ÞÝÞýÞ°"["abcdefghijklmnopqrstuvwxyz".indexOf(c.toLowerCase())] || c
                ).join("")},
                {name: "Circle", fn: t => t.split("").map(c => 
                    "ããããããããããããããããã ãÀãÂãÈãÊãËãÎãÏã´ãˋ"["abcdefghijklmnopqrstuvwxyz".indexOf(c.toLowerCase())] || c
                ).join("")},
            ];

            styles.forEach(style => {
                const styledText = style.fn(text);
                const div = document.createElement("div");
                div.className = "flex items-center justify-between bg-zinc-100 dark:bg-zinc-800 hover:bg-zinc-200 dark:hover:bg-zinc-700 p-5 rounded-2xl transition-all";
                div.innerHTML = `
                    <span class="text-lg break-all">${styledText}</span>
                    <button onclick="copyText('${styledText.replace(/'/g, "\\'")}')" 
                            class="bg-zinc-800 hover:bg-black text-white px-6 py-2.5 rounded-xl text-sm font-medium">
                        Copy
                    </button>
                `;
                results.appendChild(div);
            });
        }

        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert("ã Copied to clipboard!");
            });
        }
    </script>
</body>
</html>
