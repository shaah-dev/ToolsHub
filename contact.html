<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - ToolsHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-zinc-50 min-h-screen dark:bg-zinc-950">

    <div class="max-w-lg mx-auto px-4 py-8">
        <a href="index.html" class="inline-flex items-center gap-2 text-zinc-500 hover:text-zinc-700 mb-8">
            <i class="fa-solid fa-arrow-left"></i> Back to Home
        </a>

        <div class="bg-white dark:bg-zinc-900 rounded-3xl shadow-xl p-8 md:p-12">
            <div class="text-center mb-10">
                <div class="w-20 h-20 mx-auto bg-gradient-to-br from-blue-500 to-indigo-600 rounded-3xl flex items-center justify-center text-5xl mb-6">✉️</div>
                <h1 class="text-4xl font-semibold text-zinc-900 dark:text-white">Get in Touch</h1>
                <p class="text-zinc-600 dark:text-zinc-400 mt-3">I'd love to hear your feedback or suggestions!</p>
            </div>

            <!-- Feedback Form -->
            <form action="https://formspree.io/f/xvznagbq" method="POST" class="space-y-6">
                <input type="text" name="name" placeholder="Your Name" required
                       class="w-full px-5 py-4 border border-zinc-300 dark:border-zinc-700 rounded-2xl focus:outline-none focus:border-blue-500 dark:bg-zinc-800">
                
                <input type="email" name="email" placeholder="Your Email" required
                       class="w-full px-5 py-4 border border-zinc-300 dark:border-zinc-700 rounded-2xl focus:outline-none focus:border-blue-500 dark:bg-zinc-800">
                
                <textarea name="message" rows="5" placeholder="Your feedback or suggestion..." required
                          class="w-full px-5 py-4 border border-zinc-300 dark:border-zinc-700 rounded-2xl focus:outline-none focus:border-blue-500 dark:bg-zinc-800"></textarea>
                
                <button type="submit"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-2xl transition-all">
                    Send Message
                </button>
            </form>

            <!-- Direct Contact -->
            <div class="mt-12 pt-8 border-t border-zinc-200 dark:border-zinc-700 text-center">
                <p class="text-zinc-500 dark:text-zinc-400 mb-6">Or reach me directly</p>
                
                <div class="flex justify-center gap-10">
                    <!-- GitHub -->
                    <a href="https://github.com/shaah-dev" target="_blank" 
                       class="flex flex-col items-center gap-3 hover:scale-110 transition-transform">
                        <img src="github.jfif" alt="GitHub" class="w-14 h-14 rounded-2xl">
                        <span class="text-sm font-medium text-zinc-700 dark:text-zinc-300">GitHub</span>
                    </a>

                    <!-- Email -->
                    <a href="mailto:shadanhasanaakash@gmail.com" 
                       class="flex flex-col items-center gap-3 hover:scale-110 transition-transform">
                        <img src="email.jfif" alt="Email" class="w-14 h-14 rounded-2xl">
                        <span class="text-sm font-medium text-zinc-700 dark:text-zinc-300">Email</span>
                    </a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
