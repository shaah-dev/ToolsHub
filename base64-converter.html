<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 Converter - ToolsHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-zinc-50 min-h-screen dark:bg-zinc-950">

    <div class="max-w-lg mx-auto px-4 py-8">
        <a href="index.html" class="inline-flex items-center gap-2 text-zinc-500 hover:text-zinc-700 mb-8">
            <i class="fa-solid fa-arrow-left"></i> Back to Home
        </a>

        <div class="bg-white dark:bg-zinc-900 rounded-3xl shadow-xl p-8 md:p-10">
            <div class="text-center mb-10">
                <div class="w-20 h-20 mx-auto bg-cyan-100 dark:bg-cyan-900 text-cyan-600 rounded-2xl flex items-center justify-center text-4xl mb-4">🔢</div>
                <h1 class="text-3xl font-semibold text-zinc-900 dark:text-white">Base64 Converter</h1>
            </div>

            <textarea id="input" rows="6" placeholder="Paste text or Base64 here..." 
                      class="w-full p-5 border border-zinc-300 dark:border-zinc-700 rounded-2xl focus:outline-none focus:border-cyan-500 dark:bg-zinc-800"></textarea>

            <div class="flex gap-3 mt-6">
                <button onclick="encode()" class="flex-1 bg-cyan-600 hover:bg-cyan-700 text-white py-4 rounded-2xl">Encode to Base64</button>
                <button onclick="decode()" class="flex-1 bg-cyan-700 hover:bg-cyan-800 text-white py-4 rounded-2xl">Decode Base64</button>
            </div>

            <div id="output" class="mt-8 p-5 bg-zinc-100 dark:bg-zinc-800 rounded-2xl min-h-[120px] font-mono text-sm break-all"></div>
        </div>
    </div>

    <script>
        function encode() {
            const text = document.getElementById('input').value;
            if (!text) return;
            const encoded = btoa(unescape(encodeURIComponent(text)));
            document.getElementById('output').innerText = encoded;
        }

        function decode() {
            const text = document.getElementById('input').value;
            if (!text) return;
            try {
                const decoded = decodeURIComponent(escape(atob(text)));
                document.getElementById('output').innerText = decoded;
            } catch(e) {
                document.getElementById('output').innerText = "❌ Invalid Base64";
            }
        }
    </script>
</body>
</html>
