<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word to PDF - ToolsHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-zinc-50 min-h-screen dark:bg-zinc-950">

    <div class="max-w-lg mx-auto px-4 py-8">
        <a href="index.html" class="inline-flex items-center gap-2 text-zinc-500 hover:text-zinc-700 mb-8">
            <i class="fa-solid fa-arrow-left"></i> Back to Home
        </a>

        <div class="bg-white dark:bg-zinc-900 rounded-3xl shadow-xl p-8 md:p-10">
            <div class="text-center mb-10">
                <div class="w-20 h-20 mx-auto bg-red-100 dark:bg-red-900 text-red-600 rounded-2xl flex items-center justify-center text-4xl mb-4">📄</div>
                <h1 class="text-3xl font-semibold text-zinc-900 dark:text-white">Word to PDF</h1>
            </div>

            <div class="space-y-6">
                <div id="dropzone" class="border-2 border-dashed border-zinc-300 dark:border-zinc-700 rounded-2xl p-8 text-center hover:border-red-400 transition-colors cursor-pointer">
                    <i class="fa-solid fa-cloud-arrow-up text-4xl text-zinc-400 mb-3"></i>
                    <p class="text-zinc-600 dark:text-zinc-400">Drop .docx file here or <span class="text-red-600">browse</span></p>
                    <input type="file" id="upload" class="hidden" accept=".docx">
                </div>

                <div id="preview" class="hidden bg-zinc-100 dark:bg-zinc-800 p-6 rounded-2xl text-sm max-h-64 overflow-auto">
                    <p class="text-xs text-zinc-500 mb-2">Extracted Text Preview:</p>
                    <pre id="textPreview" class="font-mono whitespace-pre-wrap"></pre>
                </div>

                <button onclick="convert()" class="w-full bg-red-600 hover:bg-red-700 text-white font-semibold py-4 rounded-2xl">Convert to PDF</button>
                
                <button onclick="downloadPDF()" id="downloadBtn" class="hidden w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-4 rounded-2xl">
                    Download PDF
                </button>
            </div>
        </div>
    </div>

    <script>
        let extractedText = "";
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('upload');

        dropzone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', handleFile);

        function handleFile() {
            const file = fileInput.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const result = await mammoth.extractRawText({arrayBuffer: e.target.result});
                    extractedText = result.value;
                    document.getElementById('preview').classList.remove('hidden');
                    document.getElementById('textPreview').textContent = extractedText.substring(0, 800) + (extractedText.length > 800 ? '...' : '');
                } catch (err) {
                    alert("Error reading Word file");
                }
            };
            reader.readAsArrayBuffer(file);
        }

        async function convert() {
            const file = fileInput.files[0];
            if (!file) return alert("Please select a .docx file");

            document.getElementById('downloadBtn').classList.remove('hidden');
        }

        function downloadPDF() {
            if (!extractedText) return alert("No text extracted");

            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF();
            const lines = pdf.splitTextToSize(extractedText, 180);
            pdf.text(lines, 15, 15);
            pdf.save('document.pdf');
        }
    </script>
</body>
</html>
