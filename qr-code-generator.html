<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator - ToolsHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-zinc-50 min-h-screen dark:bg-zinc-950">

    <div class="max-w-lg mx-auto px-4 py-8">
        <a href="index.html" class="inline-flex items-center gap-2 text-zinc-500 hover:text-zinc-700 mb-8">
            <i class="fa-solid fa-arrow-left"></i> Back to Home
        </a>

        <div class="bg-white dark:bg-zinc-900 rounded-3xl shadow-xl p-8 md:p-10">
            <div class="text-center mb-10">
                <div class="w-20 h-20 mx-auto bg-green-100 dark:bg-green-900 text-green-600 rounded-2xl flex items-center justify-center text-4xl mb-4">📱</div>
                <h1 class="text-3xl font-semibold text-zinc-900 dark:text-white">QR Code Generator</h1>
            </div>

            <input type="text" id="text" placeholder="Enter text, URL, phone number..." 
                   class="w-full px-6 py-4 border border-zinc-300 dark:border-zinc-700 rounded-2xl mb-6 focus:outline-none focus:border-green-500 dark:bg-zinc-800"
                   onkeyup="if(event.key==='Enter') generateQR()">

            <button onclick="generateQR()" 
                    class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-4 rounded-2xl transition-all">
                Generate QR Code
            </button>

            <div id="qrcode" class="flex justify-center mt-10 p-6 bg-white dark:bg-zinc-800 rounded-2xl shadow-inner"></div>

            <button onclick="downloadQR()" id="downloadBtn" 
                    class="hidden w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-2xl">
                Download QR Code
            </button>
        </div>
    </div>

    <script>
        let currentQR = null;

        function generateQR() {
            const text = document.getElementById('text').value.trim();
            if (!text) return alert("Please enter some text or URL");

            const container = document.getElementById('qrcode');
            container.innerHTML = '';

            currentQR = new QRCode(container, {
                text: text,
                width: 260,
                height: 260,
                colorDark: "#1e40af",
                colorLight: document.documentElement.classList.contains('dark') ? "#27272a" : "#ffffff",
            });

            document.getElementById('downloadBtn').classList.remove('hidden');
        }

        function downloadQR() {
            const canvas = document.querySelector('#qrcode canvas');
            if (canvas) {
                const link = document.createElement('a');
                link.href = canvas.toDataURL('image/png');
                link.download = 'qrcode.png';
                link.click();
            }
        }
    </script>
</body>
</html>
